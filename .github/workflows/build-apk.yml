name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-35 build-tools;35.0.0 ndk;27.1.12297006 cmake;3.22.1'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Expo prebuild
        run: npx expo prebuild --platform android --clean

      - name: Disable New Architecture and ProGuard
        run: |
          sed -i 's/^newArchEnabled=true$/newArchEnabled=false/' android/gradle.properties
          sed -i 's/shrinkResources enableShrinkResources.toBoolean()/shrinkResources false/' android/app/build.gradle
          sed -i 's/minifyEnabled enableMinifyInReleaseBuilds/minifyEnabled false/' android/app/build.gradle
          grep -E 'newArchEnabled|minifyEnabled|shrinkResources' android/gradle.properties android/app/build.gradle

      - name: Build APK
        working-directory: android
        run: ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: sonic-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
